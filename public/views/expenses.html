<div class="expenses-container">
    <!-- Skeleton -->
    <div id="expenses-skeleton">
        <div class="card mb-md"><div class="skeleton skeleton-card" style="height:50px;"></div></div>
        <div class="grid grid-cols-3 mb-md">
            <div class="card"><div class="skeleton skeleton-card"></div></div>
            <div class="card"><div class="skeleton skeleton-card"></div></div>
            <div class="card"><div class="skeleton skeleton-card"></div></div>
        </div>
        <div class="card p-0">
            <div class="table-responsive">
                <table class="table"><thead><tr><th>Date</th><th>Desc</th><th>Amount</th><th>Paid By</th><th>Remarks</th><th>Actions</th></tr></thead>
                    <tbody><tr><td colspan="6"><div class="skeleton skeleton-table-row"></div><div class="skeleton skeleton-table-row"></div><div class="skeleton skeleton-table-row"></div><div class="skeleton skeleton-table-row"></div></td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Content (hidden initially) -->
    <div id="expenses-content" style="display:none;">
        <div class="card mb-md">
            <div class="flex flex-wrap justify-between align-center gap-sm">
                <h3 class="font-bold">Expenses for <span id="expense-month-label"></span></h3>
                <div class="flex gap-sm">
                    <button class="btn btn-outline" id="btn-export-expenses-csv" title="Export CSV">CSV</button>
                    <button class="btn btn-outline" id="btn-export-expenses-excel" title="Export Excel">Excel</button>
                    <button class="btn btn-primary" id="btn-add-expense" style="display:none;">Add Expense</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 mb-md">
            <div class="card stat-card"><h3 class="text-muted text-sm uppercase">Total Expenses</h3><div class="text-2xl font-bold mt-sm text-danger" id="exp-total">Rs. 0</div></div>
            <div class="card stat-card"><h3 class="text-muted text-sm uppercase">Highest Expense</h3><div class="text-2xl font-bold mt-sm" id="exp-highest">Rs. 0</div><div class="text-sm text-muted mt-sm" id="exp-highest-cat">-</div></div>
            <div class="card stat-card"><h3 class="text-muted text-sm uppercase">Avg Per Expense</h3><div class="text-2xl font-bold mt-sm" id="exp-avg">Rs. 0</div><div class="text-sm text-muted mt-sm">Per transaction</div></div>
        </div>

        <div class="card mb-md">
            <div class="flex flex-wrap justify-between align-center gap-sm">
                <input type="text" id="exp-search" class="form-control" placeholder="Search expenses..." style="max-width: 250px;">
            </div>
        </div>

        <div class="card p-0">
            <div class="table-responsive">
                <table class="table" id="expenses-table">
                    <thead><tr>
                        <th data-sort="Date" class="sortable">Date <span class="sort-arrow"></span></th>
                        <th data-sort="Description" class="sortable">Description <span class="sort-arrow"></span></th>
                        <th data-sort="Amount" class="sortable">Amount <span class="sort-arrow"></span></th>
                        <th data-sort="Paid By" class="sortable">Paid By <span class="sort-arrow"></span></th>
                        <th data-sort="Remarks" class="sortable">Remarks <span class="sort-arrow"></span></th>
                        <th>Actions</th>
                    </tr></thead>
                    <tbody><!-- Injected by JS --></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Expense Modal -->
<div id="expense-modal" class="modal-overlay"><div class="modal">
    <div class="modal-header"><h3 class="modal-title" id="expense-modal-title">Add Expense</h3><button class="modal-close" onclick="document.getElementById('expense-modal').classList.remove('active')">&times;</button></div>
    <div class="modal-body">
        <form id="expense-form"><input type="hidden" id="e-id">
            <div class="form-group"><label>Date</label><input type="date" id="e-date" class="form-control" required></div>
            <div class="form-group"><label>Description</label><input type="text" id="e-description" class="form-control" required placeholder="What was this expense for? (include category, details etc.)"></div>
            <div class="grid grid-cols-2"><div class="form-group"><label>Amount (Rs.)</label><input type="number" id="e-amount" class="form-control" required min="1"></div><div class="form-group"><label>Paid By</label><input type="text" id="e-paid-by" class="form-control" required placeholder="Who paid?"></div></div>
            <div class="form-group"><label>Remarks</label><input type="text" id="e-remarks" class="form-control"></div>
        </form>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="document.getElementById('expense-modal').classList.remove('active')">Cancel</button><button class="btn btn-primary" id="btn-save-expense" type="submit" form="expense-form">Save Expense</button></div>
</div></div>
