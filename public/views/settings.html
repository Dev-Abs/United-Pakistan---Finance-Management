<div class="settings-container max-w-3xl">
    <div class="card">
        <h3 class="font-bold mb-md">Application Settings</h3>
        <p class="text-sm text-muted mb-md">These settings are used to automatically generate WhatsApp reminder messages
            and configure defaults.</p>

        <form id="settings-form">
            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label>Organization Name</label>
                    <input type="text" id="s-org-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Sector Name</label>
                    <input type="text" id="s-sector-name" class="form-control" required>
                </div>
            </div>

            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label>Secretary Name</label>
                    <input type="text" id="s-secretary-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Default Monthly Fund (Rs.)</label>
                    <input type="number" id="s-default-fund" class="form-control" required>
                </div>
            </div>

            <h4 class="font-bold mt-md mb-sm pt-md border-top">Payment Details</h4>

            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label>Easypaisa Number</label>
                    <input type="text" id="s-easypaisa" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Account Title</label>
                    <input type="text" id="s-account-title" class="form-control" required>
                </div>
            </div>

            <div class="mt-md text-right">
                <button type="submit" id="btn-save-settings" class="btn btn-primary">Save Settings</button>
            </div>
        </form>
    </div>
</div>
