<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>United Pakistan - Finance Management</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="UP Finance">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <!-- Chart.js for reports -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/js/app.js" defer></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar (desktop) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">UP</div>
                <h2>United Pakistan</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item active" data-route="dashboard">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="/members" class="nav-item" data-route="members">
                    <span class="icon">👥</span> Members
                </a>
                <a href="/expenses" class="nav-item" data-route="expenses">
                    <span class="icon">💸</span> Expenses
                </a>
                <a href="/reports" class="nav-item" data-route="reports">
                    <span class="icon">📈</span> Reports
                </a>
                <a href="/settings" class="nav-item" data-route="settings">
                    <span class="icon">⚙️</span> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-text">
                    <span class="icon">🚪</span> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <button id="mobile-menu-btn" class="menu-btn">☰</button>
                <div class="header-title">
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="header-actions">
                    <div class="month-selector">
                        <select id="current-month-select" class="form-control">
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <button id="install-app-btn" class="btn btn-sm btn-outline" style="display:none; margin-left:8px; white-space:nowrap;">
                        <span class="icon">📲</span> Install
                    </button>
                </div>
            </header>

            <!-- Dynamic Content Container -->
            <div id="main-view" class="view-container">
                <!-- Views get injected here -->
            </div>
        </main>

        <!-- Bottom Navigation (mobile only) -->
        <nav class="bottom-nav" id="bottom-nav">
            <a href="/" class="bottom-nav-item active" data-route="dashboard">
                <span class="bottom-nav-icon">📊</span>
                <span class="bottom-nav-label">Dashboard</span>
            </a>
            <a href="/members" class="bottom-nav-item" data-route="members">
                <span class="bottom-nav-icon">👥</span>
                <span class="bottom-nav-label">Members</span>
            </a>
            <a href="/expenses" class="bottom-nav-item" data-route="expenses">
                <span class="bottom-nav-icon">💸</span>
                <span class="bottom-nav-label">Expenses</span>
            </a>
            <a href="/reports" class="bottom-nav-item" data-route="reports">
                <span class="bottom-nav-icon">📈</span>
                <span class="bottom-nav-label">Reports</span>
            </a>
            <a href="/settings" class="bottom-nav-item" data-route="settings">
                <span class="bottom-nav-icon">⚙️</span>
                <span class="bottom-nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Global Loader -->
    <div id="global-loader" class="global-loader hidden">
        <div class="spinner"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-app-btn').style.display = 'inline-flex';
        });
        document.addEventListener('click', (e) => {
            if (e.target.closest('#install-app-btn')) {
                const btn = document.getElementById('install-app-btn');
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    btn.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
