<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>United Pakistan - Finance Management</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="UP Finance">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/js/app.js" defer></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar (desktop) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">UP</div>
                <div>
                    <h2>United Pakistan</h2>
                    <p>Finance Management</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item active" data-route="dashboard">
                    <span class="icon"><i data-lucide="layout-dashboard"></i></span> Dashboard
                </a>
                <a href="/members" class="nav-item" data-route="members">
                    <span class="icon"><i data-lucide="users"></i></span> Members
                </a>
                <a href="/expenses" class="nav-item" data-route="expenses">
                    <span class="icon"><i data-lucide="receipt"></i></span> Expenses
                </a>
                <a href="/reports" class="nav-item" data-route="reports">
                    <span class="icon"><i data-lucide="bar-chart-3"></i></span> Reports
                </a>
                <a href="/settings" class="nav-item" data-route="settings">
                    <span class="icon"><i data-lucide="settings"></i></span> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-text">
                    <span class="icon"><i data-lucide="log-out"></i></span> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-left">
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="header-actions">
                    <span class="role-badge" id="user-role-badge">Admin</span>
                    <div class="month-selector">
                        <select id="current-month-select" class="form-control">
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <button id="install-app-btn" class="btn btn-sm btn-primary install-btn" title="Install App / Add to Home Screen">
                        <span class="icon"><i data-lucide="download"></i></span><span class="install-text"> Install App</span>
                    </button>
                </div>
            </header>

            <!-- Dynamic Content Container -->
            <div id="main-view" class="view-container">
                <!-- Views get injected here -->
            </div>
        </main>

        <!-- Bottom Navigation (mobile only) -->
        <nav class="bottom-nav" id="bottom-nav">
            <a href="/" class="bottom-nav-item active" data-route="dashboard">
                <span class="bottom-nav-icon"><i data-lucide="layout-dashboard"></i></span>
                <span class="bottom-nav-label">Dashboard</span>
            </a>
            <a href="/members" class="bottom-nav-item" data-route="members">
                <span class="bottom-nav-icon"><i data-lucide="users"></i></span>
                <span class="bottom-nav-label">Members</span>
            </a>
            <a href="/expenses" class="bottom-nav-item" data-route="expenses">
                <span class="bottom-nav-icon"><i data-lucide="receipt"></i></span>
                <span class="bottom-nav-label">Expenses</span>
            </a>
            <a href="/reports" class="bottom-nav-item" data-route="reports">
                <span class="bottom-nav-icon"><i data-lucide="bar-chart-3"></i></span>
                <span class="bottom-nav-label">Reports</span>
            </a>
            <a href="/settings" class="bottom-nav-item" data-route="settings">
                <span class="bottom-nav-icon"><i data-lucide="settings"></i></span>
                <span class="bottom-nav-label">Settings</span>
            </a>
            <button class="bottom-nav-item" id="bottom-logout-btn" style="border:none;background:none;cursor:pointer;font-family:inherit;">
                <span class="bottom-nav-icon"><i data-lucide="log-out"></i></span>
                <span class="bottom-nav-label">Logout</span>
            </button>
        </nav>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js');
            });
        }

        var deferredPrompt;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
        });

        document.addEventListener('click', function(e) {
            var btn = e.target.closest('#install-app-btn');
            if (!btn) return;
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function() {
                    deferredPrompt = null;
                });
            } else {
                var isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
                var isAndroid = /android/i.test(navigator.userAgent);
                var isStandalone = window.matchMedia('(display-mode: standalone)').matches;
                if (isStandalone) {
                    alert('App is already installed on your device.');
                } else if (isiOS) {
                    alert('To install: tap the Share button at the bottom of Safari, then scroll down and tap "Add to Home Screen".');
                } else if (isAndroid) {
                    alert('To install: tap the browser menu and select "Install app" or "Add to Home screen".');
                } else {
                    alert('To install: use your browser\'s "Install" or "Add to Home Screen" option from the address bar or menu.');
                }
            }
        });
    </script>
</body>
</html>
